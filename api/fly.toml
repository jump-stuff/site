# fly.toml app configuration file generated for jump-stuff-api on 2026-03-08T17:10:27-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jump-stuff-api'
primary_region = 'lax'

[build]
  [build.args]
    GO_VERSION = '1.25.5'

[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = "litefs"
  destination = "/var/lib/litefs"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
